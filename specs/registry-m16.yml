      "guardrails": [
        "iOS must preserve the full macOS 1.0 user-facing capability set.",
        "DreamJotterCore remains the source of truth for semantics and package behavior.",
        "Heavy parsing, review, export, and derived-data generation must not run synchronously on the main actor.",
        "Editor hydration, previews, caches, and background work must remain bounded and cancellation-safe.",
        "Files coordination, backgrounding, and conflicts must never silently overwrite user work.",
        "Physical-device performance and accessibility evidence are release gates."
      ],
      "notes": "Defines the architecture, delivery slices, parity catalog, performance budgets, regression expectations, human-intervention gates, and acceptance criteria for the native iPhone and iPad application."
