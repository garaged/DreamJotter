      "guardrails": [
        "The application shell swaps full-window child controllers instead of nesting the editor in a picker or modal sheet.",
        "Compact phone, regular phone, compact iPad, and regular iPad use separate top-level workspace compositions.",
        "Layout classification is based on width, size class, and idiom rather than device model names.",
        "Autocomplete overlays the editor and must not permanently reduce the TextKit viewport.",
